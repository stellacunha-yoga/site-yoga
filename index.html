  <style>
    /* ===== VARIABLES ===== */
    :root {
      --black:   #0d0d0d;
      --dark:    #141414;
      --dark2:   #1a1a1a;
      --gold:    #C9A460;
      --gold2:   #e8c97a;
      --gold3:   #a07830;
      --cream:   #f5efe6;
      --text:    #d4c4a8;
      --muted:   #8a7a62;
      --white:   #ffffff;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3, h4 { font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 0.08em; }
    .serif-italic { font-family: 'Cormorant Garamond', serif; font-style: italic; }

    .gold-text {
      background: linear-gradient(135deg, var(--gold3) 0%, var(--gold) 40%, var(--gold2) 60%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.5rem auto;
    }
    .divider-left { margin: 1.5rem 0; }

    section { padding: 100px 0; position: relative; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
