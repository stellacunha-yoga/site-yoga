<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella Studio — Yoga e Bem-Estar</title>
    <style>
        :root {
            --roxo-suave: #7b68ee;
            --fundo: #fdfbfd;
            --texto: #4a4a4a;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--fundo); color: var(--texto); margin: 0; padding: 0; }
        header { background-color: white; padding: 40px 20px; text-align: center; border-bottom: 2px solid #eee; }
        .logo { max-width: 180px; margin-bottom: 15px; border-radius: 50%; }
        h1 { color: var(--roxo-suave); font-weight: 300; letter-spacing: 2px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 1.2rem; color: var(--roxo-suave); }
        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="Imagens/logo-stella-studio.jpeg" alt="Logo Stella Studio" class="logo">
    <h1>Stella Studio</h1>
    <p>Yoga, Consciência e Bem-Estar</p>
</header>

<div class="container">
    <div class="grid">
        <div class="card"><img src="Imagens/asanas.jpeg"> <div class="card-info"><h3>Asanas</h3></div></div>
        <div class="card"><img src="Imagens/meditacao.jpg"> <div class="card-info"><h3>Meditação</h3></div></div>
        <div class="card"><img src="Imagens/pranayama2.jpg"> <div class="card-info"><h3>Pranayama</h3></div></div>
        <div class="card"><img src="Imagens/mantras.jpeg"> <div class="card-info"><h3>Mantras</h3></div></div>
        <div class="card"><img src="Imagens/mudra.jpg"> <div class="card-info"><h3>Mudras</h3></div></div>
        <div class="card"><img src="Imagens/yoganidra.jpg"> <div class="card-info"><h3>Yoga Nidra</h3></div></div>
        <div class="card"><img src="Imagens/ebook.jpeg"> <div class="card-info"><h3>Nosso Ebook</h3></div></div>
        <div class="card"><img src="Imagens/sobre-mim.jpeg"> <div class="card-info"><h3>Sobre Stella</h3></div></div>
    </div>
</div>

<footer>
    © 2026 Stella Studio - Todos os direitos reservados.
</footer>

</body>
</html>
